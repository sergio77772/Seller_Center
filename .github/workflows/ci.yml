name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ms-a:
    name: MS-A Tests (Java)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: seller_center
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('ms-a/**/*.gradle*') }}

      - name: chmod gradlew executable
        working-directory: ms-a
        run: chmod +x gradlew

      - name: Run MS-A tests
        working-directory: ms-a
        env:
          DB_URL: jdbc:postgresql://localhost:5432/seller_center
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: ./gradlew test

  test-ms-b:
    name: MS-B Tests (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ms-b/package-lock.json

      - name: Install dependencies
        working-directory: ms-b
        run: npm install

      - name: Run MS-B tests
        working-directory: ms-b
        run: npm test

  build-frontend:
    name: Frontend Build (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          VITE_BFF_URL: https://ms-b-150317434723.us-central1.run.app
        run: npm run build
