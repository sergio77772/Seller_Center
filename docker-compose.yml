version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seller_center
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-a:
    build: ./ms-a
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/seller_center
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  ms-b:
    build: ./ms-b
    ports:
      - "3001:3001"
    environment:
      MS_A_URL: http://ms-a:8080
      PORT: 3001
    depends_on:
      - ms-a
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BFF_URL: http://localhost:3001
    ports:
      - "80:80"
    depends_on:
      - ms-b

volumes:
  postgres_data:
